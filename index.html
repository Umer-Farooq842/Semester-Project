<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Planner - Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-calendar-check"></i> University Planner
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation" title="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="admin.html">Admin Panel</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <!-- Page Title -->
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="display-5 fw-bold text-primary">Student Dashboard</h1>
                <p class="text-muted">Manage your assignments, exams, projects, and study tasks</p>
            </div>
        </div>

        <!-- Alert Messages Container -->
        <div id="alertContainer" class="row mb-4">
            <!-- Alerts will be inserted here -->
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="text-center py-5 d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Loading your tasks...</p>
        </div>

        <div id="mainContent">
            <!-- Add Task Form Section -->
            <div class="row mb-5">
                <div class="col-lg-6 mx-auto">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">
                                <i class="bi bi-plus-circle"></i> Add New Task
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="taskForm">
                                <!-- Title Field -->
                                <div class="mb-3">
                                    <label for="title" class="form-label fw-bold">Title <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="title" name="title" placeholder="Task title" required>
                                    <small id="titleError" class="text-danger d-block hidden"></small>
                                </div>

                                <!-- Course Field -->
                                <div class="mb-3">
                                    <label for="course" class="form-label fw-bold">Course <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="course" name="course" placeholder="e.g., CS101" required>
                                    <small id="courseError" class="text-danger d-block hidden"></small>
                                </div>

                                <!-- Category Field -->
                                <div class="mb-3">
                                    <label for="category" class="form-label fw-bold">Category <span class="text-danger">*</span></label>
                                    <select class="form-select" id="category" name="category" required>
                                        <option value="">Select category</option>
                                        <option value="assignment">Assignment</option>
                                        <option value="exam">Exam</option>
                                        <option value="project">Project</option>
                                        <option value="study">Study Task</option>
                                    </select>
                                    <small id="categoryError" class="text-danger d-block hidden"></small>
                                </div>

                                <!-- Priority Field -->
                                <div class="mb-3">
                                    <label for="priority" class="form-label fw-bold">Priority <span class="text-danger">*</span></label>
                                    <select class="form-select" id="priority" name="priority" required>
                                        <option value="">Select priority</option>
                                        <option value="low">Low</option>
                                        <option value="medium">Medium</option>
                                        <option value="high">High</option>
                                    </select>
                                    <small id="priorityError" class="text-danger d-block hidden"></small>
                                </div>

                                <!-- Due Date Field -->
                                <div class="mb-3">
                                    <label for="dueDate" class="form-label fw-bold">Due Date <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="dueDate" name="dueDate" required>
                                    <small id="dueDateError" class="text-danger d-block hidden"></small>
                                </div>

                                <!-- Description Field -->
                                <div class="mb-3">
                                    <label for="description" class="form-label fw-bold">Description <span class="text-danger">*</span></label>
                                    <textarea class="form-control" id="description" name="description" rows="3" placeholder="Task description" required></textarea>
                                    <small id="descriptionError" class="text-danger d-block hidden"></small>
                                </div>

                                <button type="submit" class="btn btn-primary w-100 fw-bold">
                                    <i class="bi bi-plus-lg"></i> Add Task
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Filter Section -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-light">
                            <h5 class="mb-0">
                                <i class="bi bi-funnel"></i> Filters & Search
                            </h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <!-- Search -->
                                <div class="col-md-6 col-lg-2">
                                    <input type="text" class="form-control" id="searchInput" placeholder="Search tasks...">
                                </div>
                                <!-- Course Filter -->
                                <div class="col-md-6 col-lg-2">
                                    <select class="form-select" id="courseFilter" aria-label="Filter by course">
                                        <option value="">All Courses</option>
                                    </select>
                                </div>
                                <!-- Category Filter -->
                                <div class="col-md-6 col-lg-2">
                                    <select class="form-select" id="categoryFilter" aria-label="Filter by category">
                                        <option value="">All Categories</option>
                                        <option value="assignment">Assignment</option>
                                        <option value="exam">Exam</option>
                                        <option value="project">Project</option>
                                        <option value="study">Study Task</option>
                                    </select>
                                </div>
                                <!-- Priority Filter -->
                                <div class="col-md-6 col-lg-2">
                                    <select class="form-select" id="priorityFilter" aria-label="Filter by priority">
                                        <option value="">All Priorities</option>
                                        <option value="low">Low</option>
                                        <option value="medium">Medium</option>
                                        <option value="high">High</option>
                                    </select>
                                </div>
                                <!-- Status Filter -->
                                <div class="col-md-6 col-lg-2">
                                    <select class="form-select" id="statusFilter" aria-label="Filter by status">
                                        <option value="">All Statuses</option>
                                        <option value="pending">Pending</option>
                                        <option value="in-progress">In Progress</option>
                                        <option value="completed">Completed</option>
                                    </select>
                                </div>
                                <!-- Reset Button -->
                                <div class="col-md-6 col-lg-2">
                                    <button class="btn btn-secondary w-100" id="resetFilters">Reset</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tasks Display Section -->
            <div class="row">
                <div class="col-12">
                    <h3 class="mb-4">
                        <i class="bi bi-list-check"></i> Your Tasks
                        <span class="badge bg-primary" id="taskCount">0</span>
                    </h3>
                </div>
            </div>

            <!-- Tasks Grid -->
            <div id="tasksContainer" class="row g-4">
                <!-- Tasks will be rendered here -->
            </div>

            <!-- No Tasks Message -->
            <div id="noTasksMessage" class="row hidden">
                <div class="col-12">
                    <div class="alert alert-info text-center py-5">
                        <h5>No tasks found</h5>
                        <p class="mb-0">Try adjusting your filters or add a new task to get started</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App JS -->
    <script src="app.js"></script>
</body>
</html>
